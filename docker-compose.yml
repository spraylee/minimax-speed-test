services:
  minimax-speed-test-server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: minimax-speed-test-server
    restart: unless-stopped
    ports:
      - "8010:8010"
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - PORT=8010
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8010/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
