name: Deploy Web

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - ".github/workflows/deploy-web.yml"
      - "apps/web/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_NAME: minimax-speed-test
      DEPLOY_PATH: /data/apps/minimax-speed-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @minimax-speed-test/web build

      - name: Package build
        run: |
          cd apps/web/dist
          tar -czvf ../../../web.tar.gz .

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "web.tar.gz"
          target: "${{ env.DEPLOY_PATH }}"

      - name: Extract and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd ${{ env.DEPLOY_PATH }}
            rm -rf web.bak
            [ -d web ] && mv web web.bak
            mkdir -p web
            tar -xzf web.tar.gz -C web
            rm -f web.tar.gz
            echo "Web deployed successfully!"
